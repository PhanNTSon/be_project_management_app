version: '3.8'

services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  db-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - database
    # Wait for the database to be ready and then create the required database
    command: >
      /bin/bash -c "
        until /opt/mssql-tools/bin/sqlcmd -S database -U ${DB_USERNAME} -P '${DB_PASSWORD}' -Q 'SELECT 1';
        do
          echo 'Waiting for SQL Server...';
          sleep 2;
        done;
        echo 'SQL Server is ready. Initializing database...';
        /opt/mssql-tools/bin/sqlcmd -S database -U ${DB_USERNAME} -P '${DB_PASSWORD}' -Q \"IF NOT EXISTS (SELECT * FROM sys.databases WHERE name = 'SRS_SMART_MANAGEMENT_DB') BEGIN CREATE DATABASE SRS_SMART_MANAGEMENT_DB; END\";
        echo 'Database initialization complete.';
      "

  backend:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      # Map container name as host in SPRING_DATASOURCE_URL
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://database:1433;databaseName=SRS_SMART_MANAGEMENT_DB;encrypt=true;trustServerCertificate=true
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - SECRET_KEY_BASE64=${SECRET_KEY_BASE64}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - database
      - db-init

volumes:
  sqlserver_data:
