spring.application.name=project-management-app
spring.config.import=optional:file:.env[.properties]

# ───────────────────────────────────────────────
# SQL Server Configuration 
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ───────────────────────────────────────────────
# Hibernate / JPA Configuration
spring.jpa.hibernate.ddl-auto=validate      
# can be: validate | update | create
spring.jpa.show-sql=false
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true

# ───────────────────────────────────────────────
# FLyway Configuration
spring.flyway.url=${SPRING_DATASOURCE_URL}
spring.flyway.user=${DB_USERNAME}
spring.flyway.password=${DB_PASSWORD}
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true

jwt.secret = ${SECRET_KEY_BASE64}

# ───────────────────────────────────────────────
# Frontend URLs Configuration
frontend.urls=${FRONTEND_URLS:http://localhost:5173,https://jtl06r19-5173.asse.devtunnels.ms}

# ───────────────────────────────────────────────
# JWT Times Configuration
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
jwt.refresh.expiration.days=${JWT_REFRESH_EXPIRATION_DAYS:7}

# ───────────────────────────────────────────────
# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:}